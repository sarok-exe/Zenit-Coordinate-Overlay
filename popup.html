<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zenit</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 300px;
      padding: 0;
      margin: 0;
      background: #111111;
      color: #e0e0e0;
    }
    .header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 14px; background: #1a1a1a; border-bottom: 1px solid #222;
    }
    .header h1 { font-size: 16px; margin: 0; color: #bb86fc; }
    .header .badge {
      font-size: 11px; padding: 2px 8px; border-radius: 10px;
      background: #2a2a2a; color: #888;
    }
    .status-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 14px; background: #161616; font-size: 12px;
    }
    .status-bar .label { color: #888; }
    .status-bar .value { font-weight: 600; }
    .status-bar .watching { color: #4caf50; }
    .status-bar .paused { color: #f44336; }
    .actions {
      display: flex; gap: 6px; padding: 10px 14px;
    }
    .actions button {
      flex: 1; padding: 6px 12px; border: none; border-radius: 5px;
      font-size: 12px; font-weight: 600; cursor: pointer;
    }
    .btn-toggle { background: #bb86fc; color: #111; }
    .btn-toggle:hover { background: #ce93d8; }
    .btn-toggle.off { background: #333; color: #888; }
    .btn-toggle.off:hover { background: #444; }
    .btn-clear { background: transparent; color: #666; border: 1px solid #333 !important; }
    .btn-clear:hover { background: #1a1a1a; color: #f44336; border-color: #f44336 !important; }
    .history { padding: 0 14px 14px; }
    .history h2 {
      font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
      color: #555; margin: 12px 0 6px;
    }
    .game-card {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 10px; margin-bottom: 4px; border-radius: 5px;
      background: #1a1a1a; border: 1px solid #222; cursor: default;
      transition: background 0.15s;
    }
    .game-card:hover { background: #222; }
    .game-card .info { min-width: 0; }
    .game-card .meta {
      font-size: 11px; color: #888; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis;
    }
    .game-card .players {
      font-size: 12px; color: #e0e0e0; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis;
    }
    .game-card .players .result { color: #bb86fc; font-weight: 600; }
    .game-card .right {
      text-align: right; flex-shrink: 0; margin-left: 8px;
    }
    .game-card .right .tc {
      font-size: 10px; color: #555;
    }
    .game-card .right .time {
      font-size: 10px; color: #555;
    }
    .no-games {
      text-align: center; padding: 20px; color: #555; font-size: 12px;
    }
    .empty-state {
      text-align: center; padding: 30px 14px; color: #555;
    }
    .empty-state .icon { font-size: 28px; margin-bottom: 8px; }
    .empty-state .text { font-size: 12px; }

    /* Custom confirmation modal - Coffee Shop theme */
    .z-modal-overlay {
      display: flex; position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(3px);
      align-items: center; justify-content: center;
      animation: zFadeIn 0.2s ease;
    }
    .z-modal-overlay.closing { animation: zFadeOut 0.2s ease; }
    .z-modal {
      background: #3e2723; border: 1px solid #5d4037; border-radius: 12px;
      padding: 20px 24px; max-width: 260px; width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .z-modal h3 { margin: 0 0 8px; font-size: 14px; color: #d7ccc8; }
    .z-modal p { margin: 0 0 16px; font-size: 12px; color: #efebe9; line-height: 1.4; }
    .z-modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
    .z-modal-btns button {
      padding: 6px 14px; border: none; border-radius: 6px;
      font-size: 12px; font-weight: 600; cursor: pointer;
    }
    .z-modal-cancel { background: transparent; color: #a1887f; }
    .z-modal-cancel:hover { color: #d7ccc8; }
    .z-modal-delete { background: #c62828; color: #fff; }
    .z-modal-delete:hover { background: #e53935; }
    @keyframes zFadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes zFadeOut { from { opacity: 1; } to { opacity: 0; } }
  </style>
</head>
<body>
  <div class="header">
    <h1>Zenit</h1>
    <span class="badge" id="countBadge">0</span>
  </div>
  <div class="status-bar">
    <span><span class="label">Status:</span> <span class="value" id="status">Watching</span></span>
    <span><span class="label">Games:</span> <span class="value" id="count">0</span></span>
  </div>
  <div class="actions">
    <button class="btn-toggle" id="toggleBtn">Pause</button>
    <button class="btn-clear" id="clearBtn">Clear History</button>
  </div>
  <div class="history" id="historyList"></div>
  <div id="z-modal-container"></div>
  <script src="popup.js"></script>
</body>
</html>
